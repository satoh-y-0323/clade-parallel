[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "clade-parallel"
version = "0.1.0"
description = "Run read-only Clade agents in parallel from a YAML-frontmatter Markdown manifest."
requires-python = ">=3.10"
dependencies = ["PyYAML>=6.0"]

[project.scripts]
clade-parallel = "clade_parallel.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=7",
    "ruff",
    "black",
    "mypy",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.black]
line-length = 88

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.lint.per-file-ignores]
# Test files may have long lines from Japanese function names and unused imports
# that are part of the public API being tested.
"tests/**" = ["E501", "F401", "F541"]

[tool.pytest.ini_options]
addopts = "-m 'not slow'"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]

[tool.mypy]
python_version = "3.10"
strict = true

[[tool.mypy.overrides]]
# Test files are generated by the tester agent and do not carry full type
# annotations. Relax strict checks for the test directory only.
module = ["tests.*", "conftest"]
disallow_untyped_defs = false
disallow_incomplete_defs = false
disallow_any_generics = false
